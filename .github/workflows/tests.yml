name: Tests

on:
  push:
  pull_request:

jobs:
  pest:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            laravel: '^10.0'
            testbench: '^8.0'
          - php: '8.2'
            laravel: '^11.0'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '^13.0'
            testbench: '^11.0'
          - php: '8.5'
            laravel: '^13.0'
            testbench: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer require \
            "illuminate/support:${{ matrix.laravel }}" \
            "illuminate/http:${{ matrix.laravel }}" \
            --no-interaction \
            --no-update
          composer require --dev \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction \
            --no-update
          composer update --prefer-dist --no-interaction --no-progress --with-all-dependencies

      - name: Run Pest
        run: composer test
